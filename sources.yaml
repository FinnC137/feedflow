# FeedFlow 信源配置
# 新增信源 = 在这里加一条记录
# 不需要改代码，不需要新增 cronjob

sources:
  - name: "LT视界"
    family: youtube             # 采集家族: youtube / bilibili / rss / podcast
    channel_id: UCOsQMj_MZkQ5N7f1OOMB87Q
    output_level: default       # heavy / default / light
    filter: international_only  # 过滤规则（family-specific）

